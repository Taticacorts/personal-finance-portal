  async function handleAdd(formData) {
    const extraCols = getExtraCols();
    const vencCol = colVencimiento();
    const otrosNombre = (formData.otrosNombre || '').trim();
    let otrosIdx = -1;
    if (otrosNombre) {
      if (!extraCols.includes(otrosNombre)) {
        extraCols.push(otrosNombre);
        saveExtraCols(extraCols);
      }
      otrosIdx = extraCols.indexOf(otrosNombre);
    }
    const newVencCol = 9 + extraCols.length;
    const ef = Number(formData.efectivo) || 0;
    const cdt = Number(formData.cdt) || 0;
    const cu = Number(formData.cuenta) || 0;
    const ic = Number(formData.interesCdt) || 0;
    const bs = Number(formData.bcoSantander) || 0;
    const db = Number(formData.davivBolsillo) || 0;
    const da = Number(formData.dollarApp) || 0;
    const extraVals = extraCols.map((col, idx) => {
      if (otrosNombre && idx === otrosIdx) {
        return String(Number(formData.otrosValor) || 0);
      }
      return '0';
    });
    const total = ef + cdt + cu + ic + bs + db + da + extraVals.reduce((s, v) => s + (Number(v) || 0), 0);
    const values = [formData.rubro, String(total), String(ef), String(cdt), String(cu), String(ic), String(bs), String(db), String(da), ...extraVals, formData.vencimiento || ''];
    data.push(values);
    if (currentContainer) buildForm(currentContainer);
    renderTable();
    const sheetName = SHEET_CONFIG['mis-ahorros'].sheetName;
    await SyncModule.enqueue({ type: 'create', module: 'mis-ahorros', sheetName, values });
    await CacheModule.saveSheetData(sheetName, { values: data, headers: SHEET_CONFIG['mis-ahorros'].columns });
    Components.showToast('Rubro agregado', 'success');
  }

  function handleEdit(rowIndex) {
    const tableSection = document.getElementById('table-ahorros');
    if (!tableSection) return;
    const table = tableSection.querySelector('table');
    if (!table) return;
    const tr = table.querySelectorAll('tbody tr')[rowIndex];
    if (!tr) return;
    const extraCols = getExtraCols();
    const vencCol = colVencimiento();
    const currentData = data[rowIndex];
    tr.classList.add('editing');
    const cells = tr.querySelectorAll('td');
    // Actions cell (0) - replace with save/cancel
    const actionsCell = cells[0];
    actionsCell.innerHTML = '';
    const saveBtn = document.createElement('button'); saveBtn.className = 'btn-icon'; saveBtn.textContent = '\u2713'; saveBtn.title = 'Guardar';
    saveBtn.addEventListener('click', () => saveEdit(rowIndex, tr));
    const cancelBtn = document.createElement('button'); cancelBtn.className = 'btn-icon'; cancelBtn.textContent = '\u2718'; cancelBtn.title = 'Cancelar';
    cancelBtn.addEventListener('click', () => renderTable());
    actionsCell.appendChild(saveBtn);
    actionsCell.appendChild(cancelBtn);
    // Rubro cell (1)
    cells[1].innerHTML = '<input class="form-control" type="text" value="' + (currentData[0] || '') + '">';
    // Total cell (2) - readonly
    // Numeric cells (3 onwards)
    for (let i = FIXED_NUMERIC_START; i < vencCol; i++) {
      const raw = currentData[i];
      cells[i + 1].innerHTML = '<input class="form-control" type="number" value="' + (Number(raw) || 0) + '">';
    }
    // Vencimiento
    cells[vencCol + 1].innerHTML = '<input class="form-control" type="text" value="' + (currentData[vencCol] || '') + '" placeholder="DD/MM/AAAA">';
  }

  async function saveEdit(rowIndex, tr) {
    const extraCols = getExtraCols();
    const vencCol = colVencimiento();
    const inputs = tr.querySelectorAll('input');
    const rubro = inputs[0].value;
    const numericCount = vencCol - FIXED_NUMERIC_START;
    const numericVals = [];
    for (let k = 0; k < numericCount; k++) {
      numericVals.push(Number(inputs[1 + k].value) || 0);
    }
    const vencimiento = inputs[1 + numericCount] ? inputs[1 + numericCount].value : '';
    const total = numericVals.reduce((s, v) => s + v, 0);
    const newValues = [rubro, String(total), ...numericVals.map(v => String(v)), vencimiento];
    data[rowIndex] = newValues;
    renderTable();
    const sheetName = SHEET_CONFIG['mis-ahorros'].sheetName;
    await SyncModule.enqueue({ type: 'update', module: 'mis-ahorros', sheetName, rowIndex: rowIndex + 1, values: newValues });
    await CacheModule.saveSheetData(sheetName, { values: data, headers: SHEET_CONFIG['mis-ahorros'].columns });
    Components.showToast('Rubro actualizado', 'success');
  }

  function handleDelete(rowIndex) {
    Components.createModal(
      'Eliminar Rubro',
      '\u00BFEstas seguro de que deseas eliminar este rubro?',
      async () => {
        const sheetName = SHEET_CONFIG['mis-ahorros'].sheetName;
        data.splice(rowIndex, 1);
        renderTable();
        await SyncModule.enqueue({ type: 'delete', module: 'mis-ahorros', sheetName, rowIndex: rowIndex + 1 });
        await CacheModule.saveSheetData(sheetName, { values: data, headers: SHEET_CONFIG['mis-ahorros'].columns });
        Components.showToast('Rubro eliminado', 'success');
      }
    );
  }

  return { render };
})();

const NominaModule = (() => {
  let selectedMonth = null;
  let monthData = [];
  let currentContainer = null;

  /**
   * Render the Nomina module into the container.
   * @param {HTMLElement} container
   */
  async function render(container) {
    currentContainer = container;
    container.innerHTML = '';

    // Page header
    const header = Components.createPageHeader('N\u00f3mina', '\uD83D\uDCB0', []);
    container.appendChild(header);

    // Month grid
    const grid = document.createElement('div');
    grid.className = 'month-grid';
    grid.id = 'month-grid';

    const currentMonth = new Date().getMonth();

    MONTHS.forEach((month, idx) => {
      const card = document.createElement('div');
      card.className = 'month-card' + (idx === currentMonth ? ' current' : '');
      card.dataset.month = idx;
      card.innerHTML = `
        <div class="month-icon">${month.icon}</div>
        <div class="month-name">${month.name}</div>
        ${idx === currentMonth ? '<span class="month-badge">Actual</span>' : ''}
      `;
      card.addEventListener('click', () => selectMonth(idx));
      grid.appendChild(card);
    });

    container.appendChild(grid);

    // Detail section (hidden initially)
    const detail = document.createElement('div');
    detail.id = 'nomina-detail';
    detail.style.display = 'none';
    container.appendChild(detail);

    // Auto-select current month
    selectMonth(currentMonth);
  }

  async function selectMonth(monthIndex) {
    selectedMonth = monthIndex;

    // Update active state in grid
    const cards = document.querySelectorAll('.month-card');
    cards.forEach((card, idx) => {
      card.classList.toggle('active', idx === monthIndex);
    });

    // Show detail section
    const detail = document.getElementById('nomina-detail');
    if (!detail) return;
    detail.style.display = 'block';
    detail.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    await loadMonthData(monthIndex);
  }

  async function loadMonthData(monthIndex) {
    try {
      const sheetName = SHEET_CONFIG['nomina'].getSheetName(monthIndex); if (!sheetName) { monthData = []; renderMonthDetail(monthIndex); return; }
      let sheetData = await CacheModule.getSheetData(sheetName);

      if (!sheetData) {
        sheetData = await GraphModule.readSheet(sheetName);
        await CacheModule.saveSheetData(sheetName, sheetData);
      }

      monthData = (sheetData.values || []).map(r => SHEET_CONFIG['nomina'].mapRow(r, monthIndex)).filter(function(r){ return (r[0]||'').toString().trim() !== '' || Number(r[1]) || Number(r[2]); });
      renderMonthDetail(monthIndex);
    } catch (err) {
      const sheetName = SHEET_CONFIG['nomina'].getSheetName(monthIndex); if (!sheetName) { monthData = []; renderMonthDetail(monthIndex); return; }
      const cached = await CacheModule.getSheetData(sheetName);
      if (cached) {
        monthData = (cached.values || []).map(r => SHEET_CONFIG['nomina'].mapRow(r, monthIndex)).filter(function(r){ return (r[0]||'').toString().trim() !== '' || Number(r[1]) || Number(r[2]); });
        renderMonthDetail(monthIndex);
        Components.showToast('Mostrando datos en cache', 'warning');
      } else {
        const detail = document.getElementById('nomina-detail');
        monthData = []; renderMonthDetail(monthIndex); Components.showToast('No hay hoja para este mes. Puedes crear registros.', 'info');
      }
    }
  }

  function renderMonthDetail(monthIndex) {
    const detail = document.getElementById('nomina-detail');
    if (!detail) return;
    detail.innerHTML = '';

    const monthName = MONTHS[monthIndex].name;

    // Calculate badges
    let sueldoReal = 0;
    let totalCostos = 0;
    monthData.forEach(row => {
      const sr = Number(row[1]) || 0;
      const cost = Number(row[2]) || 0;
      if (sr > sueldoReal) sueldoReal = sr;
      totalCostos += cost;
    });
    const disponible = sueldoReal - totalCostos;

    // Month title
    const title = document.createElement('h2');
    title.className = 'page-title mt-lg mb-md';
    title.textContent = MONTHS[monthIndex].icon + ' ' + monthName;
    detail.appendChild(title);

    // Badges
    const badgeContainer = document.createElement('div');
    badgeContainer.className = 'badge-container';
    badgeContainer.appendChild(Components.createBadge('SUELDO REAL', maskValue(formatCOP(sueldoReal)), '\uD83D\uDCB5'));
    badgeContainer.appendChild(Components.createBadge('SUELDO', maskValue(formatCOP(sueldoReal)), '\uD83D\uDCB3'));
    const dispBadge = Components.createBadge('DISPONIBLE', maskValue(formatCOP(disponible)), '\u2705');
    dispBadge.id = 'badge-disponible';
    badgeContainer.appendChild(dispBadge);
    detail.appendChild(badgeContainer);

    // Table
    const tableContainer = document.createElement('div');
    tableContainer.id = 'table-nomina';
    detail.appendChild(tableContainer);
    renderNominaTable(tableContainer);

    // Add record form
    const form = Components.createFormCard('Agregar Registro', [
      { name: 'concepto', label: 'Concepto', placeholder: 'Concepto (ej: Sueldo)', type: 'text' },
      { name: 'valor', label: 'Valor', placeholder: '0', type: 'number' },
      { name: 'observacion', label: 'Observacion', placeholder: 'Observacion', type: 'text', required: false }
    ], handleAdd);
    detail.appendChild(form);

    // =================== SECCION BONO ===================
    const bonoSection = document.createElement('div');
    bonoSection.className = 'mt-lg';
    bonoSection.id = 'bono-section';
    bonoSection.innerHTML = '<div class="collapsible-header" id="bono-header"><span>' + String.fromCodePoint(0x1F31F) + ' Bono</span><span id="bono-chevron">' + String.fromCodePoint(0x25BC) + '</span></div><div class="collapsible-content" id="bono-content"><div id="bono-table-container"></div><div id="bono-form-container" class="mt-md"></div></div>';
    detail.appendChild(bonoSection);
    document.getElementById('bono-header').addEventListener('click', () => {
      const content = document.getElementById('bono-content');
      const chevron = document.getElementById('bono-chevron');
      content.classList.toggle('open');
      chevron.textContent = content.classList.contains('open') ? String.fromCodePoint(0x25B2) : String.fromCodePoint(0x25BC);
    });
    loadBonoData();

  }

  function renderNominaTable(tableContainer) {
    tableContainer.innerHTML = '';
    const container = document.createElement('div');
    container.className = 'table-container';
    const table = document.createElement('table');
    table.className = 'data-table';
    table.style.fontSize = '0.75rem';

    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    ['CONCEPTO', 'COSTO', 'ACCIONES'].forEach(h => {
      const th = document.createElement('th'); th.textContent = h; th.style.padding = '6px 8px'; th.style.fontSize = '0.65rem'; headerRow.appendChild(th);
    });
    thead.appendChild(headerRow); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    monthData.forEach((row, rowIdx) => {
      const tr = document.createElement('tr');
      // Concepto
      const tdConc = document.createElement('td'); tdConc.textContent = row[0] || ''; tdConc.style.padding = '4px 8px'; tdConc.style.fontWeight = '500'; tr.appendChild(tdConc);
      // Costo (use row[2] which is the costo from mapRow, or row[1] for months without mapRow)
      const costoVal = Number(row[1]) || Number(row[2]) || 0;
      const tdCost = document.createElement('td'); tdCost.textContent = costoVal ? maskValue(formatCOP(costoVal)) : ''; tdCost.style.padding = '4px 8px'; tdCost.style.fontWeight = '600'; tdCost.style.color = 'var(--color-primary)'; tr.appendChild(tdCost);
      // Actions
      const actionsCell = document.createElement('td'); actionsCell.className = 'actions-cell'; actionsCell.style.padding = '4px';
      const editBtn = document.createElement('button'); editBtn.className = 'btn-icon btn-icon-edit'; editBtn.style.width = '24px'; editBtn.style.height = '24px'; editBtn.style.fontSize = '0.7rem'; editBtn.textContent = String.fromCodePoint(0x270F, 0xFE0F); editBtn.addEventListener('click', () => handleEdit(rowIdx)); actionsCell.appendChild(editBtn);
      const delBtn = document.createElement('button'); delBtn.className = 'btn-icon btn-icon-danger'; delBtn.style.width = '24px'; delBtn.style.height = '24px'; delBtn.style.fontSize = '0.7rem'; delBtn.textContent = String.fromCodePoint(0x1F5D1, 0xFE0F); delBtn.addEventListener('click', () => handleDelete(rowIdx)); actionsCell.appendChild(delBtn);
      tr.appendChild(actionsCell);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody); container.appendChild(table); tableContainer.appendChild(container);
  }

  async function handleAdd(formData) {
    // Calculate disponible
    let sueldoReal = 0;
    monthData.forEach(row => {
      const sr = Number(row[1]) || 0;
      if (sr > sueldoReal) sueldoReal = sr;
    });

    const costo = Number(formData.valor) || 0;
    const values = [formData.concepto, '0', String(costo), '0'];
    monthData.push(values);

    const tableContainer = document.getElementById('table-nomina');
    if (tableContainer) renderNominaTable(tableContainer);
    updateBadges();

    const sheetName = SHEET_CONFIG['nomina'].getSheetName(selectedMonth);
    await SyncModule.enqueue({
      type: 'create',
      module: 'nomina',
      sheetName: sheetName,
      values: values
    });
    await CacheModule.saveSheetData(sheetName, { values: monthData, headers: SHEET_CONFIG['nomina'].columns });
    Components.showToast('Registro agregado', 'success');
  }

  function handleEdit(rowIndex) {
    const tableContainer = document.getElementById('table-nomina');
    if (!tableContainer) return;

    const table = tableContainer.querySelector('table');
    if (!table) return;

    const row = table.querySelectorAll('tbody tr')[rowIndex];
    if (!row) return;

    const currentData = monthData[rowIndex];
    row.classList.add('editing');

    const cells = row.querySelectorAll('td');
    for (let i = 0; i < 4; i++) {
      const cell = cells[i];
      const value = currentData[i] || '';
      const type = i === 0 ? 'text' : 'number';
      cell.innerHTML = `<input class="form-control" type="${type}" value="${value}">`;
    }

    const actionsCell = cells[4];
    actionsCell.innerHTML = '';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn-icon';
    saveBtn.textContent = '\u2713';
    saveBtn.addEventListener('click', () => saveEdit(rowIndex, row));

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn-icon';
    cancelBtn.textContent = '\u2718';
    cancelBtn.addEventListener('click', () => {
      const tc = document.getElementById('table-nomina');
      if (tc) renderNominaTable(tc);
    });

    actionsCell.appendChild(saveBtn);
    actionsCell.appendChild(cancelBtn);
  }

  async function saveEdit(rowIndex, row) {
    const inputs = row.querySelectorAll('input');
    const newValues = Array.from(inputs).map(inp => inp.value);

    monthData[rowIndex] = newValues;
    const tableContainer = document.getElementById('table-nomina');
    if (tableContainer) renderNominaTable(tableContainer);
    updateBadges();

    const sheetName = SHEET_CONFIG['nomina'].getSheetName(selectedMonth);
    await SyncModule.enqueue({
      type: 'update',
      module: 'nomina',
      sheetName: sheetName,
      rowIndex: rowIndex + 1,
      values: newValues
    });
    await CacheModule.saveSheetData(sheetName, { values: monthData, headers: SHEET_CONFIG['nomina'].columns });
    Components.showToast('Registro actualizado', 'success');
  }

  function handleDelete(rowIndex) {
    Components.createModal(
      'Eliminar Registro',
      '\u00BFEstas seguro de que deseas eliminar este registro?',
      async () => {
        const sheetName = SHEET_CONFIG['nomina'].getSheetName(selectedMonth);
        monthData.splice(rowIndex, 1);
        const tableContainer = document.getElementById('table-nomina');
        if (tableContainer) renderNominaTable(tableContainer);
        updateBadges();

        await SyncModule.enqueue({
          type: 'delete',
          module: 'nomina',
          sheetName: sheetName,
          rowIndex: rowIndex + 1
        });
        await CacheModule.saveSheetData(sheetName, { values: monthData, headers: SHEET_CONFIG['nomina'].columns });
        Components.showToast('Registro eliminado', 'success');
      }
    );
  }

  function updateBadges() {
    let sueldoReal = 0;
    let totalCostos = 0;
    monthData.forEach(row => {
      const sr = Number(row[1]) || 0;
      const cost = Number(row[2]) || 0;
      if (sr > sueldoReal) sueldoReal = sr;
      totalCostos += cost;
    });
    const disponible = sueldoReal - totalCostos;

    const dispBadge = document.getElementById('badge-disponible');
    if (dispBadge) {
      const valueEl = dispBadge.querySelector('.badge-value');
      if (valueEl) valueEl.textContent = maskValue(formatCOP(disponible));
    }
  }


  // =================== BONO FUNCTIONS ===================
  let bonoData = [];

  async function loadBonoData() {
    try {
      const sheetName = SHEET_CONFIG['bono'].sheetName;
      let sheetData = await CacheModule.getSheetData(sheetName);
      if (!sheetData) {
        sheetData = await GraphModule.readSheet(sheetName);
        await CacheModule.saveSheetData(sheetName, sheetData);
      }
      bonoData = (sheetData.values || []).filter(r => r[0] || Number(r[1]));
    } catch (err) {
      const cached = await CacheModule.getSheetData(SHEET_CONFIG['bono'].sheetName);
      if (cached) { bonoData = (cached.values || []).filter(r => r[0] || Number(r[1])); }
      else { bonoData = []; }
    }
    renderBonoTable();
    renderBonoForm();
  }

  function renderBonoTable() {
    const container = document.getElementById('bono-table-container');
    if (!container) return;
    container.innerHTML = '';
    if (bonoData.length === 0) { container.innerHTML = '<p class="text-light text-sm">No hay rubros de bono.</p>'; return; }
    const wrap = document.createElement('div'); wrap.className = 'table-container';
    const table = document.createElement('table'); table.className = 'data-table';
    const thead = document.createElement('thead'); const hr = document.createElement('tr');
    ['CONCEPTO', 'VALOR', 'ACCIONES'].forEach(h => { const th = document.createElement('th'); th.textContent = h; hr.appendChild(th); });
    thead.appendChild(hr); table.appendChild(thead);
    const tbody = document.createElement('tbody'); let totalBono = 0;
    bonoData.forEach((row, idx) => {
      const tr = document.createElement('tr');
      const td0 = document.createElement('td'); td0.textContent = row[0] || ''; tr.appendChild(td0);
      const td1 = document.createElement('td'); const v = Number(row[1]) || 0; if ((row[0]||'').toLowerCase().includes('saldo')) { totalBono += v; } td1.textContent = formatCOP(v); tr.appendChild(td1);
      const tdA = document.createElement('td'); tdA.className = 'actions-cell';
      const eBtn = document.createElement('button'); eBtn.className = 'btn-icon btn-icon-edit'; eBtn.textContent = String.fromCodePoint(0x270F, 0xFE0F); eBtn.addEventListener('click', () => handleBonoEdit(idx)); tdA.appendChild(eBtn);
      const dBtn = document.createElement('button'); dBtn.className = 'btn-icon btn-icon-danger'; dBtn.textContent = String.fromCodePoint(0x1F5D1, 0xFE0F); dBtn.addEventListener('click', () => handleBonoDelete(idx)); tdA.appendChild(dBtn);
      tr.appendChild(tdA); tbody.appendChild(tr);
    });
    const totR = document.createElement('tr'); totR.style.fontWeight = 'bold';
    const totL = document.createElement('td'); totL.textContent = 'TOTAL BONO'; totR.appendChild(totL);
    const totV = document.createElement('td'); totV.textContent = maskValue(formatCOP(totalBono)); totR.appendChild(totV);
    totR.appendChild(document.createElement('td')); tbody.appendChild(totR);
    table.appendChild(tbody); wrap.appendChild(table); container.appendChild(wrap);
  }

  function renderBonoForm() {
    const container = document.getElementById('bono-form-container'); if (!container) return;
    container.innerHTML = '';
    const form = Components.createFormCard('Agregar Rubro de Bono', [
      { name: 'concepto', label: 'Concepto', placeholder: 'Ej: Prima', type: 'text' },
      { name: 'valor', label: 'Valor', placeholder: '0', type: 'number' }
    ], handleBonoAdd);
    container.appendChild(form);
  }

  async function handleBonoAdd(formData) {
    const values = [formData.concepto, String(Number(formData.valor) || 0)];
    bonoData.push(values); renderBonoTable();
    const sheetName = SHEET_CONFIG['bono'].sheetName;
    await SyncModule.enqueue({ type: 'create', module: 'bono', sheetName, values });
    await CacheModule.saveSheetData(sheetName, { values: bonoData, headers: SHEET_CONFIG['bono'].columns });
    Components.showToast('Rubro de bono agregado', 'success');
  }

  function handleBonoEdit(rowIndex) {
    const container = document.getElementById('bono-table-container'); if (!container) return;
    const table = container.querySelector('table'); if (!table) return;
    const row = table.querySelectorAll('tbody tr')[rowIndex]; if (!row) return;
    const cur = bonoData[rowIndex]; row.classList.add('editing');
    const cells = row.querySelectorAll('td');
    cells[0].innerHTML = '<input class="form-control" type="text" value="' + (cur[0] || '') + '">';
    cells[1].innerHTML = '<input class="form-control" type="number" value="' + (cur[1] || 0) + '">';
    const ac = cells[2]; ac.innerHTML = '';
    const sBtn = document.createElement('button'); sBtn.className = 'btn-icon'; sBtn.textContent = String.fromCodePoint(0x2713);
    sBtn.addEventListener('click', async () => {
      const inputs = row.querySelectorAll('input');
      bonoData[rowIndex] = [inputs[0].value, inputs[1].value]; renderBonoTable();
      const sheetName = SHEET_CONFIG['bono'].sheetName;
      await SyncModule.enqueue({ type: 'update', module: 'bono', sheetName, rowIndex: rowIndex + 1, values: bonoData[rowIndex] });
      await CacheModule.saveSheetData(sheetName, { values: bonoData, headers: SHEET_CONFIG['bono'].columns });
      Components.showToast('Rubro actualizado', 'success');
    });
    const cBtn = document.createElement('button'); cBtn.className = 'btn-icon'; cBtn.textContent = String.fromCodePoint(0x2718);
    cBtn.addEventListener('click', () => renderBonoTable());
    ac.appendChild(sBtn); ac.appendChild(cBtn);
  }

  function handleBonoDelete(rowIndex) {
    Components.createModal('Eliminar Rubro', String.fromCodePoint(0xBF) + 'Eliminar este rubro de bono?', async () => {
      bonoData.splice(rowIndex, 1); renderBonoTable();
      const sheetName = SHEET_CONFIG['bono'].sheetName;
      await SyncModule.enqueue({ type: 'delete', module: 'bono', sheetName, rowIndex: rowIndex + 1 });
      await CacheModule.saveSheetData(sheetName, { values: bonoData, headers: SHEET_CONFIG['bono'].columns });
      Components.showToast('Rubro eliminado', 'success');
    });
  }

  return { render };
})();
// app.js - Router hash-based y bootstrap de la aplicacion.

function navigateTo(route) {
  window.location.hash = route;
}

const App = (() => {
  let isInitialized = false;

  async function init() {
    try {
      await CacheModule.initialize();
      AuthModule.initialize();
      await new Promise(resolve => setTimeout(resolve, 100));

      if (AuthModule.isAuthenticated()) {
        renderApp();
      } else {
        renderLogin();
      }
    } catch (err) {
      console.error('App initialization error:', err);
      renderLogin('Error al inicializar la aplicacion. Intenta de nuevo.');
    }
  }

  function renderLogin(errorMessage) {
    const app = document.body;
    app.innerHTML = `
      <div class="login-screen">
        <div class="login-card">
          <h1 class="login-title">Finanzas - Control Personal</h1>
          <p class="login-subtitle">Inicia sesion para gestionar tus finanzas</p>
          <div id="login-error" class="text-danger text-sm mb-md" style="min-height:1.5em;">${errorMessage || ''}</div>
          <button class="btn-microsoft" id="btn-login">
            <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
            Iniciar Sesion con Microsoft
          </button>
        </div>
      </div>
    `;
    document.getElementById('btn-login').addEventListener('click', handleLogin);
  }

  async function handleLogin() {
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-login');
    try {
      btn.disabled = true;
      btn.textContent = 'Iniciando sesion...';
      if (errorEl) errorEl.textContent = '';
      await AuthModule.login();
      if (AuthModule.isAuthenticated()) {
        renderApp();
      }
    } catch (err) {
      console.error('Login error:', err);
      if (errorEl) errorEl.textContent = 'Error al iniciar sesion. ' + (err.message || 'Intenta de nuevo.');
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Iniciar Sesion con Microsoft';
    }
  }

  function renderApp() {
    const app = document.body;
    app.innerHTML = '';

    // Simple layout: fixed sidebar + content with margin
    const container = document.createElement('div');
    container.id = 'app-container';

    // Render sidebar (fixed position via CSS)
    SidebarModule.render(container);

    // Main content wrapper - offset by sidebar width
    const mainWrapper = document.createElement('div');
    mainWrapper.id = 'main-wrapper';
    mainWrapper.style.marginLeft = '220px';
    mainWrapper.style.minHeight = '100vh';
    mainWrapper.style.backgroundColor = '#f5f5f5';

    // Header bar
    const user = AuthModule.getCurrentUser();
    const headerBar = document.createElement('header');
    headerBar.style.cssText = 'display:flex;align-items:center;justify-content:flex-end;padding:12px 24px;background:#fff;border-bottom:1px solid #e0e0e0;';
    
    if (user) {
      headerBar.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><div style="width:36px;height:36px;border-radius:50%;background:#4CAF50;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;">' + user.avatarInitial + '</div><div><div style="font-size:0.875rem;font-weight:600;">' + user.displayName + '</div><div style="font-size:0.75rem;color:#666;">' + user.email + '</div></div></div>';
    }
    
    const togBtn = document.createElement('button'); togBtn.id='toggle-vis'; togBtn.style.cssText='font-size:1.3rem;margin-left:12px;cursor:pointer;border:none;background:none;'; togBtn.title='Ocultar/Mostrar valores'; togBtn.textContent='\u{1F441}'; togBtn.addEventListener('click', function(){ const hidden = togBtn.dataset.hidden === '1'; togBtn.dataset.hidden = hidden ? '0' : '1'; document.querySelectorAll('.badge-value').forEach(function(el){ if(!hidden){el.dataset.rv=el.textContent;el.textContent='\u0024 \u2022\u2022\u2022\u2022';}else{if(el.dataset.rv)el.textContent=el.dataset.rv;} }); document.querySelectorAll('td').forEach(function(el){ var t=el.textContent; if(t.indexOf('\u0024 ')===0 && t.length>3){ if(!hidden){el.dataset.rv=t;el.textContent='\u0024 \u2022\u2022\u2022\u2022';}else{if(el.dataset.rv)el.textContent=el.dataset.rv;} } }); }); headerBar.appendChild(togBtn);
    mainWrapper.appendChild(headerBar);

    // Content area
    const mainContent = document.createElement('main');
    mainContent.id = 'main-content';
    mainContent.style.cssText = 'padding:24px;overflow-y:auto;';
    mainWrapper.appendChild(mainContent);

    container.appendChild(mainWrapper);
    app.appendChild(container);

    setupRouter();
    handleRoute();
    isInitialized = true;
  }

  function setupRouter() {
    window.addEventListener('hashchange', handleRoute);
  }

  function handleRoute() {
    const hash = window.location.hash || '#/';
    const route = ROUTES[hash] || 'dashboard';
    const mainContent = document.getElementById('main-content');
    if (!mainContent) return;

    SidebarModule.updateActiveState();

    switch (route) {
      case 'dashboard':
        DashboardModule.render(mainContent);
        break;
      case 'gastos-apartamento':
        GastosApartamentoModule.render(mainContent);
        break;
      case 'gastos-obra':
        GastosObraModule.render(mainContent);
        break;
      case 'mis-ahorros':
        MisAhorrosModule.render(mainContent);
        break;
      case 'nomina':
        NominaModule.render(mainContent);
        break;
      default:
        DashboardModule.render(mainContent);
    }
  }

  return { init };
})();

document.addEventListener('DOMContentLoaded', () => {
  App.init();


});
